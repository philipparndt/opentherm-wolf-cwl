[platformio]
default_envs = esp32

; =============================================================================
; Common dependencies
; =============================================================================
[common]
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.2.0
    ihormelnyk/OpenTherm Library@^1.1.5
    olikraus/U8g2@^2.35.0
lib_ldf_mode = deep+

; Common pin assignments (override per-env if needed)
common_build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DPIN_STATUS_LED=2
    -DPIN_OT_IN=21
    -DPIN_OT_OUT=22
    -DPIN_SDA=19
    -DPIN_SCL=23
    -DPIN_ENC_CLK=16
    -DPIN_ENC_DT=17
    -DPIN_ENC_SW=5

common_extra_scripts =
    pre:scripts/version.py
    scripts/gzip_webfiles.py

; =============================================================================
; ESP32 DevKit (WiFi)
; =============================================================================
[env:esp32]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
lib_ldf_mode = ${common.lib_ldf_mode}
build_flags =
    ${common.common_build_flags}
    -DUSE_WIFI=1
    -DBOARD_TYPE=\"esp32\"
extra_scripts = ${common.common_extra_scripts}
board_build.filesystem = littlefs
board_build.partitions = partitions_webui.csv

; =============================================================================
; Olimex ESP32-POE (Ethernet)
; Pin conflicts with default esp32: GPIO23=ETH_PHY_MDC, GPIO16=SCL (no PSRAM)
; Available GPIOs: 2,4,5,13(SDA),14,15,33,34(input-only),35(input-only),36(input-only)
; =============================================================================
[env:esp32-poe]
platform = espressif32@6.9.0
board = esp32-poe
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.2.0
    ihormelnyk/OpenTherm Library@^1.1.5
    olikraus/U8g2@^2.35.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DUSE_ETHERNET=1
    -DPIN_STATUS_LED=2
    -DBOARD_TYPE=\"esp32-poe\"
    -DPIN_OT_IN=36
    -DPIN_OT_OUT=4
    -DPIN_SDA=13
    -DPIN_SCL=16
    -DPIN_ENC_CLK=15
    -DPIN_ENC_DT=14
    -DPIN_ENC_SW=5
extra_scripts = ${common.common_extra_scripts}
board_build.filesystem = littlefs
board_build.partitions = partitions_webui.csv

; =============================================================================
; ESP32 DevKit — Simulation (fake OpenTherm, WiFi)
; =============================================================================
[env:esp32-sim]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
lib_ldf_mode = ${common.lib_ldf_mode}
build_flags =
    ${common.common_build_flags}
    -DUSE_WIFI=1
    -DBOARD_TYPE=\"esp32-sim\"
    -DSIMULATE_OT=1
extra_scripts = ${common.common_extra_scripts}
board_build.filesystem = littlefs
board_build.partitions = partitions_webui.csv

; =============================================================================
; Olimex ESP32-POE — Simulation (fake OpenTherm, Ethernet)
; =============================================================================
[env:esp32-poe-sim]
platform = espressif32@6.9.0
board = esp32-poe
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.2.0
    ihormelnyk/OpenTherm Library@^1.1.5
    olikraus/U8g2@^2.35.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DUSE_ETHERNET=1
    -DPIN_STATUS_LED=2
    -DBOARD_TYPE=\"esp32-poe-sim\"
    -DPIN_OT_IN=36
    -DPIN_OT_OUT=4
    -DPIN_SDA=13
    -DPIN_SCL=16
    -DPIN_ENC_CLK=15
    -DPIN_ENC_DT=14
    -DPIN_ENC_SW=5
    -DSIMULATE_OT=1
    -DUSE_SSD1306=1
extra_scripts = ${common.common_extra_scripts}
board_build.filesystem = littlefs
board_build.partitions = partitions_webui.csv
